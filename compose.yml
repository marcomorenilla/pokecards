services:
  app:
    image: laravel-fish:latest
    container_name: laravel-pokecards
    stdin_open: true 
    tty: true
    networks:
      - pokecards      
    volumes:
      - ./html:/var/www/html
    ports:
      - "8001:8000"
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "ping", "-c", "4", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: mariadb:10.11
    container_name: mariadb-pokecards
    networks:
      - pokecards
    env_file:
      - .env
    volumes:
      - mariadb-pokedata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s

volumes:
  mariadb-pokedata:

networks:
  pokecards:
    driver: bridge